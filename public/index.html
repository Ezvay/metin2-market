<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT2Market — Marketplace Prywatnych Serwerów Metin2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="particles"></div>
  <header id="header">
    <div class="header-inner">
      <a href="#" class="logo" onclick="navigate('home');return false;">
        <img src="/images/logo.png" class="logo-img" alt="MT2Market">
        <div class="logo-texts">
          <span class="logo-text">MT2<span class="logo-accent">Market</span></span>
          <span class="logo-sub">METIN2 MARKETPLACE</span>
        </div>
      </a>
      <nav class="nav-links" id="nav-links">
        <a href="#" onclick="navigate('servers');return false;">Serwery</a>
        <a href="#" onclick="navigate('offers');return false;">Wszystkie ogłoszenia</a>
        <a href="#" onclick="navigate('add-offer');return false;" class="nav-cta">+ Wystaw przedmiot</a>
      </nav>
      <div class="header-right">
        <div id="auth-buttons">
          <button class="btn btn-ghost btn-sm" onclick="showModal('login')">Zaloguj</button>
          <button class="btn btn-gold btn-sm" onclick="showModal('register')">Rejestracja</button>
        </div>
        <div id="user-nav" style="display:none">
          <a href="#" class="msg-btn" onclick="navigate('messages');return false;" title="Wiadomości">
            💬<span id="msg-badge" class="badge" style="display:none"></span>
          </a>
          <a href="#" class="user-chip" onclick="navigate('account');return false;">
            <span id="nav-role-icon">🧙</span>
            <span id="nav-username"></span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main id="app"></main>
  <div id="modal-overlay" onclick="closeModal()"></div>
  <div id="modal-box"></div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
</body>
</html>
